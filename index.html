<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Database</title>

<style>

body{
    margin:0;
    background:#36393f;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    width:350px;
    background:#2f3136;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.logo{
    display:flex;
    justify-content:center;
    margin-bottom:15px;
}

.logo img{
    width:80px;
    height:80px;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:#1e2124;
    color:white;
    box-sizing:border-box;
}

.row{
    display:flex;
    gap:10px;
}

.row div{
    flex:1;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#5865F2;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4752c4;
}

.popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#57F287;
    color:black;
    padding:15px;
    border-radius:8px;
    display:none;
    font-weight:bold;
}

.note{
    margin-top:15px;
    font-size:12px;
    color:#b9bbbe;
    text-align:center;
}

</style>
</head>

<body>

<div class="popup" id="popup">
Demo Submitted Successfully!
</div>

<div class="card">

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord Logo">
</div>

<h2>Discord Demo Database</h2>

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your name">

<div class="row">

<div>
<label>Student ID</label>
<input type="text" id="studentid" placeholder="ID Number">
</div>

<div>
<label>Section</label>
<input type="text" id="section" placeholder="Section">
</div>

</div>

<label>Email</label>
<input type="email" id="email" placeholder="example@gmail.com">

<button onclick="showPopup()">
Submit
</button>

<div class="note">
This is a school demo form only.
</div>

</div>

<script>

async function showPopup(){

let name = document.getElementById("name").value;
let studentid = document.getElementById("studentid").value;
let section = document.getElementById("section").value;
let email = document.getElementById("email").value;

if(name === "" || studentid === "" || section === "" || email === ""){
    alert("Please fill in all fields.");
    return;
}

try {

await fetch("https://script.google.com/macros/s/AKfycbwJSEeQNhG6f-YmQkGXDfp6DsNocxj6amjb_3C3VrMKzqz6lCTKaF96txBFuzLLWbkQuQ/exec", {

    method: "POST",

    body: JSON.stringify({

        name: name,
        studentid: studentid,
        section: section,
        email: email

    })

});

document.getElementById("popup").style.display = "block";

setTimeout(function(){

document.getElementById("popup").style.display = "none";

},3000);

document.getElementById("name").value = "";
document.getElementById("studentid").value = "";
document.getElementById("section").value = "";
document.getElementById("email").value = "";

} catch(error){

alert("Error submitting form.");

console.log(error);

}

}

</script>

</body>
</html>
