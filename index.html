<!DOCTYPE html>
<html>
<head>
<title>Discord Dashboard</title>
<style>
body{
    background:#36393f;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#2f3136;
    padding:30px;
    border-radius:10px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#202225;
    border:none;
    color:white;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#5865F2;
    border:none;
    color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>Discord Dashboard</h2>

<input placeholder="Username">
<input placeholder="Email">

<button>Continue</button>
</div>

</body>
</html>
