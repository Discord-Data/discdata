<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Payment Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#36393f;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.card{
    width:350px;
    background:#2f3136;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:80px;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:#1e2124;
    color:white;
    font-size:15px;
    outline:none;
}

.row{
    display:flex;
    gap:15px;
}

.row div{
    flex:1;
}

.btn{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#5865F2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#4752c4;
}

.popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#57F287;
    color:black;
    padding:15px 20px;
    border-radius:10px;
    font-weight:bold;
    display:none;
}

.note{
    margin-top:15px;
    text-align:center;
    font-size:12px;
    color:#b9bbbe;
}
</style>
</head>

<body>

<div class="popup" id="popup">
    Demo Submitted!
</div>

<div class="card">

    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </div>

    <h2>School Payment Demo</h2>

    <label>Student Name</label>
    <input type="text" id="name" placeholder="Enter student name">

    <div class="row">

        <div>
            <label>Student ID</label>
            <input type="text" id="studentid" placeholder="2026-0001">
        </div>

        <div>
            <label>Section</label>
            <input type="text" id="section" placeholder="STEM-A">
        </div>

    </div>

    <label>Email</label>
    <input type="email" id="email" placeholder="student@gmail.com">

    <button class="btn" onclick="submitForm()">
        Submit Demo
    </button>

    <div class="note">
        Demo only — no real payment information collected.
    </div>

</div>

<script>

async function submitForm(){

let name = document.getElementById("name").value;
let studentid = document.getElementById("studentid").value;
let section = document.getElementById("section").value;
let email = document.getElementById("email").value;

if(name === "" || studentid === "" || section === "" || email === ""){
    alert("Please fill in all fields.");
    return;
}

try {

await fetch(
"https://script.google.com/macros/s/AKfycbytvfI5MqcPFlm_IbnxOehtMpjanZ_gLFov7LvyjHNod7w24B7e1Erw7lCdv7j7ZPzISg/exec",
{
    method: "POST",

    mode: "no-cors",

    headers: {
        "Content-Type": "text/plain"
    },

    body: JSON.stringify({
        name:name,
        studentid:studentid,
        section:section,
        email:email
    })
});

const popup = document.getElementById("popup");

popup.style.display = "block";

setTimeout(function(){
    popup.style.display = "none";
},3000);

document.getElementById("name").value = "";
document.getElementById("studentid").value = "";
document.getElementById("section").value = "";
document.getElementById("email").value = "";

} catch(error){

alert("Error submitting form.");

console.log(error);

}

}

</script>

</body>
</html>
