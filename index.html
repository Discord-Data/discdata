<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Style Dashboard</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#36393f;
    font-family:Arial;
}

.card{
    background:#2f3136;
    width:350px;
    padding:30px;
    border-radius:12px;
    color:white;
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:80px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#202225;
    color:white;
}

.row{
    display:flex;
    gap:10px;
}

.row div{
    flex:1;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#5865F2;
    color:white;
    cursor:pointer;
}

.popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#57F287;
    color:black;
    padding:15px;
    border-radius:8px;
    display:none;
}
</style>
</head>

<body>

<div class="popup" id="popup">
Success!
</div>

<div class="card">

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</div>

<h2>Discord Dashboard</h2>

<label>Username</label>
<input type="text" placeholder="Enter username">

<label>Email</label>
<input type="email" placeholder="Enter email">

<div class="row">
<div>
<label>Plan</label>
<input type="text" placeholder="Nitro">
</div>

<div>
<label>Code</label>
<input type="text" placeholder="XXXX">
</div>
</div>

<button onclick="showPopup()">Continue</button>

</div>

<script>
function showPopup(){
    var popup = document.getElementById("popup");
    popup.style.display = "block";

    setTimeout(function(){
        popup.style.display = "none";
    }, 3000);
}
</script>

</body>
</html>
