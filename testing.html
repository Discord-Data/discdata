<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Dashboard</title>

<style>
    body{
        margin:0;
        background:#36393f;
        font-family:Arial, sans-serif;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card{
        width:350px;
        background:#2f3136;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 20px rgba(0,0,0,0.4);
        position:relative;
    }

    .logo{
        text-align:center;
        margin-bottom:20px;
    }

    .logo img{
        width:80px;
    }

    h2{
        text-align:center;
        margin-bottom:25px;
    }

    label{
        display:block;
        margin-top:15px;
        margin-bottom:5px;
        font-size:14px;
        color:#ffffff;
    }

    input{
        width:100%;
        padding:14px;
        border:none;
        border-radius:6px;
        background:#1e2124;
        color:white;
        font-size:15px;
        outline:none;
        box-sizing:border-box;
        transition:0.2s;
    }

    input::placeholder{
        color:#72767d;
    }

    input:focus{
        border:2px solid #5865F2;
        background:#1a1d21;
    }

    .row{
        display:flex;
        gap:15px;
    }

    .btn{
        width:100%;
        margin-top:25px;
        padding:14px;
        background:#5865F2;
        border:none;
        border-radius:8px;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.2s;
    }

    .btn:hover{
        background:#4752c4;
    }

    .popup{
        position:fixed;
        top:20px;
        right:20px;
        background:#57F287;
        color:#000;
        padding:15px 20px;
        border-radius:10px;
        font-weight:bold;
        display:none;
        animation:fadeIn 0.3s ease;
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(-10px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }
</style>
</head>

<body>

<div class="popup" id="popup">
    You've already sent successfully!
</div>

<div class="card">

    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord Logo">
    </div>

    <h2>Billing Information</h2>

    <label>Card Number</label>
    <input type="text" placeholder="1234 5678 9012 3456">

    <div class="row">
        <div style="flex:1;">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM/YY">
        </div>

        <div style="flex:1;">
            <label>CVV</label>
            <input type="password" placeholder="***">
        </div>
    </div>

    <button class="btn" onclick="showPopup()">Continue</button>

</div>

<script>
function showPopup(){
    const popup = document.getElementById("popup");

    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 3000);
}
</script>

</body>
</html>
